<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣華語研修</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1521;--surface:#1a2235;--surface2:#222d42;--border:#2d3d5a;
  --blue:#4a7fd4;--blue-light:#6b9be8;--blue-glow:rgba(74,127,212,0.3);
  --green:#3db87a;--green-glow:rgba(61,184,122,0.25);
  --red:#e05555;--red-glow:rgba(224,85,85,0.25);
  --gold:#f0b429;--text:#e8edf5;--text-mid:#8fa3c0;--text-muted:#4d6080;--radius:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* HOME */
#home{background:radial-gradient(ellipse at 30% 20%,rgba(74,127,212,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(61,184,122,.08) 0%,transparent 50%),var(--bg);padding:40px 24px;align-items:center}
.home-header{text-align:center;margin-bottom:40px}
.home-badge{display:inline-block;background:var(--blue-glow);border:1px solid var(--blue);color:var(--blue-light);font-size:11px;letter-spacing:3px;padding:5px 16px;border-radius:20px;margin-bottom:16px}
.home-title{font-family:'Noto Serif TC',serif;font-size:30px;font-weight:700;line-height:1.2;margin-bottom:8px}
.home-title span{color:var(--blue-light)}
.home-sub{font-size:13px;color:var(--text-mid);letter-spacing:1px}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;width:100%;max-width:420px;margin-bottom:20px}
.lesson-label{font-size:10px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px}
.lesson-name{font-size:16px;font-weight:500;margin-bottom:4px}
.lesson-meta{font-size:12px;color:var(--text-mid)}
.modes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:420px}
.mode-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;cursor:pointer;transition:all .2s;text-align:center;color:var(--text)}
.mode-btn:hover{border-color:var(--blue);background:var(--surface2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.mode-icon{font-size:28px;margin-bottom:8px}
.mode-name{font-size:14px;font-weight:500;margin-bottom:4px}
.mode-desc{font-size:11px;color:var(--text-mid)}

/* SHARED HEADER */
.game-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
.back-btn{background:none;border:none;color:var(--text-mid);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:all .15s}
.back-btn:hover{color:var(--text);background:var(--surface2)}
.game-title{font-size:15px;font-weight:500;flex:1}
.progress-bar{height:4px;background:var(--border);border-radius:2px;flex:1;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.score-badge{background:var(--surface2);border:1px solid var(--border);color:var(--gold);font-size:12px;padding:4px 12px;border-radius:20px}
.game-body{padding:24px 20px;max-width:500px;margin:0 auto;width:100%;flex:1}

/* FLASHCARDS */
.fc-counter{text-align:center;font-size:12px;color:var(--text-muted);margin-bottom:16px;letter-spacing:2px}
.fc-wrap{perspective:1000px;margin-bottom:16px}
.fc-card{width:100%;height:220px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;background:var(--surface);border:1px solid var(--border);border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;backface-visibility:hidden;padding:24px}
.fc-back{transform:rotateY(180deg);background:var(--surface2);border-color:var(--blue)}
.fc-hint{font-size:10px;letter-spacing:2px;color:var(--text-muted);margin-bottom:10px}
.fc-char{font-family:'Noto Serif TC',serif;font-size:52px;font-weight:700;color:var(--text);margin-bottom:6px}
.fc-pinyin{font-size:16px;color:var(--blue-light);margin-bottom:4px}
.fc-meaning{font-size:14px;color:var(--text-mid)}
.fc-example{font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center;line-height:1.6}
.fc-sound-row{display:flex;justify-content:center;margin-bottom:14px}
.fc-sound-btn{background:var(--blue-glow);border:1px solid var(--blue);color:var(--blue-light);border-radius:50%;width:48px;height:48px;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fc-sound-btn:hover{background:var(--blue);color:#fff;transform:scale(1.1)}
.fc-sound-btn.playing{animation:pulse .6s infinite alternate}
@keyframes pulse{from{box-shadow:0 0 0 0 var(--blue-glow)}to{box-shadow:0 0 0 10px transparent}}
.fc-controls{display:flex;gap:12px;justify-content:center}
.fc-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:12px;font-size:14px;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.fc-btn.prev:hover{border-color:var(--text-mid)}
.fc-btn.next{background:var(--blue);border-color:var(--blue);color:#fff}
.fc-btn.next:hover{background:var(--blue-light)}

/* MEMORY MATCH */
.mm-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.mm-tile{aspect-ratio:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .2s;text-align:center;padding:6px;line-height:1.3;position:relative;overflow:hidden}
.mm-tile::before{content:'';position:absolute;inset:0;background:var(--surface2);transition:opacity .25s;opacity:1}
.mm-tile.revealed::before,.mm-tile.matched::before{opacity:0}
.mm-tile.matched{border-color:var(--green);background:rgba(61,184,122,.1)}
.mm-tile.wrong{border-color:var(--red);animation:shake .3s}
.mm-tile-inner{position:relative;z-index:1}
.mm-tile:hover:not(.matched){border-color:var(--blue);transform:scale(1.03)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.mm-stats{display:flex;justify-content:space-between;font-size:13px;color:var(--text-mid);margin-bottom:16px}

/* TONE QUIZ */
.tq-char-box{background:var(--blue);border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:12px}
.tq-char{font-family:'Noto Serif TC',serif;font-size:64px;font-weight:700;color:#fff;line-height:1;margin-bottom:8px}
.tq-meaning{font-size:14px;color:rgba(255,255,255,.75)}
.tq-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.tq-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 10px;font-size:17px;color:var(--text);cursor:pointer;transition:all .15s;text-align:center;font-family:'Noto Sans TC',sans-serif;letter-spacing:1px}
.tq-btn:hover:not(:disabled){border-color:var(--blue);background:var(--surface2)}
.tq-btn.selected{border-color:var(--blue);background:var(--surface2)}
.tq-btn.correct{background:var(--green-glow);border-color:var(--green);color:#7de8b0}
.tq-btn.wrong{background:var(--red-glow);border-color:var(--red);color:#ff8a8a}
.tq-submit{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;width:100%;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;margin-top:4px}
.tq-submit:disabled{opacity:.4;cursor:default}

/* SENTENCE2 */
.s2-prompt{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:15px;color:var(--text);margin-bottom:16px;line-height:1.7}
.s2-answer-area{min-height:72px;background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center;transition:border-color .2s}
.s2-answer-area.has-content{border-color:var(--blue)}
.s2-tile{background:var(--blue);color:#fff;border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .15s;user-select:none;text-align:center}
.s2-tile .tile-cn{font-size:16px;font-weight:500}
.s2-tile .tile-py{font-size:10px;opacity:.8;margin-top:2px;letter-spacing:.5px}
.s2-tile:hover{background:var(--blue-light);transform:scale(1.05)}
.s2-bank{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.s2-bank-tile{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .15s;user-select:none;text-align:center}
.s2-bank-tile .tile-cn{font-size:16px;font-weight:500}
.s2-bank-tile .tile-py{font-size:10px;color:var(--text-muted);margin-top:2px;letter-spacing:.5px}
.s2-bank-tile:hover:not(.used){border-color:var(--blue)}
.s2-bank-tile.used{opacity:.25;pointer-events:none}
.s2-actions{display:flex;gap:10px}
.s2-check{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:12px 24px;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex:1}
.s2-clear{background:var(--surface2);color:var(--text-mid);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.s2-feedback{border-radius:10px;padding:14px 16px;font-size:13px;margin-top:12px;line-height:1.7;display:none}
.s2-feedback.correct{background:var(--green-glow);border:1px solid var(--green);color:var(--green)}
.s2-feedback.wrong{background:var(--red-glow);border:1px solid var(--red);color:#ff8a8a}

/* RESULT */
.result-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:radial-gradient(ellipse at center,rgba(74,127,212,.12) 0%,transparent 70%)}
.result-circle{width:120px;height:120px;border-radius:50%;background:var(--surface);border:3px solid var(--blue);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:24px;box-shadow:0 0 40px var(--blue-glow)}
.result-score{font-size:36px;font-weight:700;color:var(--blue-light)}
.result-total{font-size:12px;color:var(--text-muted)}
.result-msg{font-size:18px;font-weight:500;margin-bottom:8px}
.result-sub{font-size:13px;color:var(--text-mid);margin-bottom:32px}
.result-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.result-retry{background:var(--blue);color:#fff;border:none;border-radius:12px;padding:14px;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}
.result-home{background:var(--surface);color:var(--text-mid);border:1px solid var(--border);border-radius:12px;padding:14px;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif}

@keyframes pop{0%{transform:scale(.8);opacity:0}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .25s cubic-bezier(.34,1.56,.64,1)}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-header">
    <h1 class="home-title">台灣華語研修<br><span>禮貌・稱呼・興趣</span></h1>
    <p class="home-sub">時代華語 p.45, 47–49 ｜ 2025/5/22</p>
  </div>
  <div class="lesson-card">
    <div class="lesson-label">本課教材</div>
    <div class="lesson-name">禮貌用語 / 稱呼和職業 / 興趣愛好</div>
    <div class="lesson-meta">詞語 15 個・句型 4 種・禮貌對話 7 組</div>
  </div>
  <div class="modes-grid">
    <div class="mode-btn" onclick="startFlashcards()">
      <div class="mode-icon">🃏</div>
      <div class="mode-name">Flashcards</div>
      <div class="mode-desc">詞語記憶卡＋發音</div>
    </div>
    <div class="mode-btn" onclick="startMemory()">
      <div class="mode-icon">🧩</div>
      <div class="mode-name">Memory Match</div>
      <div class="mode-desc">中文配對遊戲</div>
    </div>
    <div class="mode-btn" onclick="startToneQuiz()">
      <div class="mode-icon">🎵</div>
      <div class="mode-name">聲調練習</div>
      <div class="mode-desc">選出正確拼音</div>
    </div>
    <div class="mode-btn" onclick="startSentence2()">
      <div class="mode-icon">🧱</div>
      <div class="mode-name">句子拼圖</div>
      <div class="mode-desc">詞卡＋拼音重組</div>
    </div>
  </div>
</div>

<!-- FLASHCARDS -->
<div class="screen" id="flashcards">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="game-title">🃏 Flashcards</span>
    <div class="progress-bar"><div class="progress-fill" id="fc-progress"></div></div>
  </div>
  <div class="game-body">
    <div class="fc-counter" id="fc-counter"></div>
    <div class="fc-wrap">
      <div class="fc-card" id="fc-card" onclick="flipCard()">
        <div class="fc-front">
          <div class="fc-hint">點擊翻轉</div>
          <div class="fc-char" id="fc-char"></div>
        </div>
        <div class="fc-back">
          <div class="fc-pinyin" id="fc-pinyin"></div>
          <div class="fc-meaning" id="fc-meaning"></div>
          <div class="fc-example" id="fc-example"></div>
        </div>
      </div>
    </div>
    <div class="fc-sound-row">
      <button class="fc-sound-btn" id="fc-sound-btn" onclick="speakWord()" title="播放發音">🔊</button>
    </div>
    <div class="fc-controls">
      <button class="fc-btn prev" onclick="fcPrev()">← 上一張</button>
      <button class="fc-btn next" onclick="fcNext()">下一張 →</button>
    </div>
  </div>
</div>

<!-- MEMORY MATCH -->
<div class="screen" id="memory">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="game-title">🧩 Memory Match</span>
    <div class="score-badge" id="mm-score-badge">0 配對</div>
  </div>
  <div class="game-body">
    <div class="mm-stats">
      <span id="mm-pairs">配對：0 / 8</span>
      <span id="mm-moves">步數：0</span>
      <span id="mm-timer">⏱ 0s</span>
    </div>
    <div class="mm-grid" id="mm-grid"></div>
  </div>
</div>

<!-- TONE QUIZ -->
<div class="screen" id="tonequiz">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="game-title">🎵 聲調練習</span>
    <div class="progress-bar"><div class="progress-fill" id="tq-progress"></div></div>
    <div class="score-badge" id="tq-score-badge">0分</div>
  </div>
  <div class="game-body">
    <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-bottom:14px" id="tq-q-num"></div>
    <div class="tq-char-box">
      <div class="tq-char" id="tq-char"></div>
      <div class="tq-meaning" id="tq-meaning"></div>
    </div>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;text-align:center">選出正確的拼音聲調</p>
    <div class="tq-grid" id="tq-grid"></div>
    <button class="tq-submit" id="tq-submit" onclick="tqSubmit()" disabled>確認 ✓</button>
  </div>
</div>

<!-- SENTENCE2 -->
<div class="screen" id="sentence2">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="game-title">🧱 句子拼圖</span>
    <div class="score-badge" id="s2-score-badge">0 / 0</div>
  </div>
  <div class="game-body">
    <div id="s2-q-num" style="font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-bottom:12px"></div>
    <div class="s2-prompt" id="s2-prompt"></div>
    <div class="s2-answer-area" id="s2-answer"></div>
    <div class="s2-bank" id="s2-bank"></div>
    <div class="s2-actions">
      <button class="s2-clear" onclick="s2Clear()">清除</button>
      <button class="s2-check" onclick="s2Check()">確認 ✓</button>
    </div>
    <div class="s2-feedback" id="s2-feedback"></div>
  </div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="game-header">
    <button class="back-btn" onclick="goHome()">←</button>
    <span class="game-title">結果</span>
  </div>
  <div class="result-screen">
    <div class="result-circle">
      <div class="result-score" id="res-score"></div>
      <div class="result-total" id="res-total"></div>
    </div>
    <div class="result-msg" id="res-msg"></div>
    <div class="result-sub" id="res-sub"></div>
    <div class="result-btns">
      <button class="result-retry" id="res-retry">再玩一次</button>
      <button class="result-home" onclick="goHome()">回首頁</button>
    </div>
  </div>
</div>

<script>
// DATA
const vocab=[
  {char:'喜歡',pinyin:'xǐ huān',meaning:'好き・好む',example:'我喜歡咖啡。'},
  {char:'愛',pinyin:'ài',meaning:'愛する・大好き',example:'她愛小貓。'},
  {char:'小狗',pinyin:'xiǎo gǒu',meaning:'子犬・小型犬',example:'你喜歡小狗嗎？'},
  {char:'小貓',pinyin:'xiǎo māo',meaning:'子猫・猫',example:'他愛小貓。'},
  {char:'拉麵',pinyin:'lā miàn',meaning:'ラーメン',example:'我喜歡吃拉麵。'},
  {char:'咖啡',pinyin:'kā fēi',meaning:'コーヒー',example:'我喜歡咖啡，你呢？'},
  {char:'旅行',pinyin:'lǚ xíng',meaning:'旅行する',example:'我們都喜歡旅行。'},
  {char:'跑步',pinyin:'pǎo bù',meaning:'ジョギング・走る',example:'她喜歡跑步。'},
  {char:'照相',pinyin:'zhào xiàng',meaning:'写真を撮る',example:'你喜歡照相嗎？'},
  {char:'看電影',pinyin:'kàn diàn yǐng',meaning:'映画を見る',example:'我喜歡看電影。'},
  {char:'不好意思',pinyin:'bù hǎo yì si',meaning:'すみません・恐れ入ります',example:'不好意思，麻煩你了。'},
  {char:'謝謝',pinyin:'xiè xie',meaning:'ありがとう',example:'謝謝！不會哦！'},
  {char:'老師',pinyin:'lǎo shī',meaning:'先生・教師',example:'你好，○老師！'},
  {char:'校長',pinyin:'xiào zhǎng',meaning:'校長',example:'早安，校長！'},
  {char:'辛苦了',pinyin:'xīn kǔ le',meaning:'お疲れ様でした',example:'辛苦了！—辛苦了！'},
];

const toneData=[
  {char:'喜歡',meaning:'好き・好む',correct:'xǐ huān',opts:['xī huān','xí huān','xǐ huān','xì huān']},
  {char:'咖啡',meaning:'コーヒー',correct:'kā fēi',opts:['ká fēi','kā fēi','kǎ fēi','kà fēi']},
  {char:'旅行',meaning:'旅行する',correct:'lǚ xíng',opts:['lū xíng','lú xíng','lǚ xíng','lù xíng']},
  {char:'照相',meaning:'写真を撮る',correct:'zhào xiàng',opts:['zhāo xiāng','záo xiáng','zhǎo xiǎng','zhào xiàng']},
  {char:'老師',meaning:'先生・教師',correct:'lǎo shī',opts:['lāo shī','láo shī','lǎo shī','lào shī']},
  {char:'謝謝',meaning:'ありがとう',correct:'xiè xie',opts:['xiē xie','xié xie','xiě xie','xiè xie']},
  {char:'不好意思',meaning:'すみません',correct:'bù hǎo yì si',opts:['bū hǎo yī si','bú hǎo yì si','bù háo yì si','bù hǎo yì si']},
  {char:'辛苦了',meaning:'お疲れ様',correct:'xīn kǔ le',opts:['xīn kū le','xīn kú le','xīn kǔ le','xīn kù le']},
  {char:'拉麵',meaning:'ラーメン',correct:'lā miàn',opts:['lā miān','lā mián','lā miǎn','lā miàn']},
  {char:'跑步',meaning:'ジョギング',correct:'pǎo bù',opts:['pāo bù','páo bù','pǎo bù','pào bù']},
];

const sentences2=[
  {prompt:'🇯🇵 私もコーヒーが好きです。',answer:'我也喜歡咖啡。',
   tiles:[{cn:'我',py:'wǒ'},{cn:'也',py:'yě'},{cn:'喜歡',py:'xǐ huān'},{cn:'咖啡',py:'kā fēi'},{cn:'。',py:''}]},

// HELPERS
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function goHome(){clearInterval(mmInterval);showScreen('home')}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function showResult(mode,score,total,sub){
  const pct=Math.round(score/total*100);
  const msg=pct>=80?'太棒了！🎉':pct>=60?'不錯哦！💪':'繼續加油！📖';
  document.getElementById('res-score').textContent=score;
  document.getElementById('res-total').textContent=`/ ${total}`;
  document.getElementById('res-msg').textContent=msg;
  document.getElementById('res-sub').textContent=sub||`正確率 ${pct}%`;
  const map={flashcards:startFlashcards,memory:startMemory,tonequiz:startToneQuiz,sentence2:startSentence2};
  document.getElementById('res-retry').onclick=map[mode];
  showScreen('result');
}

// FLASHCARDS + AUDIO
let fcIdx=0;
function startFlashcards(){fcIdx=0;showScreen('flashcards');renderFC()}
function renderFC(){
  const v=vocab[fcIdx];
  document.getElementById('fc-char').textContent=v.char;
  document.getElementById('fc-pinyin').textContent=v.pinyin;
  document.getElementById('fc-meaning').textContent=v.meaning;
  document.getElementById('fc-example').textContent=v.example;
  document.getElementById('fc-counter').textContent=`${fcIdx+1} / ${vocab.length}`;
  document.getElementById('fc-progress').style.width=`${(fcIdx+1)/vocab.length*100}%`;
  const card=document.getElementById('fc-card');
  card.classList.remove('flipped');
  card.classList.add('pop');
  setTimeout(()=>card.classList.remove('pop'),300);
  setTimeout(()=>speakWord(),500);
}
function speakWord(){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(vocab[fcIdx].char);
  utter.lang='zh-TW';utter.rate=0.85;
  const btn=document.getElementById('fc-sound-btn');
  btn.classList.add('playing');
  utter.onend=()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(utter);
}
function flipCard(){document.getElementById('fc-card').classList.toggle('flipped')}
function fcNext(){if(fcIdx<vocab.length-1){fcIdx++;renderFC()}}
function fcPrev(){if(fcIdx>0){fcIdx--;renderFC()}}

// MEMORY MATCH
let mmFlipped=[],mmMatched=0,mmMoves=0,mmTimer=0,mmInterval=null,mmLocked=false;
const mmPairs=[
  {a:'喜歡',b:'xǐ huān'},{a:'咖啡',b:'kā fēi'},
  {a:'旅行',b:'lǚ xíng'},{a:'照相',b:'zhào xiàng'},
  {a:'小狗',b:'xiǎo gǒu'},{a:'老師',b:'lǎo shī'},
  {a:'謝謝',b:'xiè xie'},{a:'辛苦了',b:'xīn kǔ le'},
];
function startMemory(){
  mmFlipped=[];mmMatched=0;mmMoves=0;mmTimer=0;mmLocked=false;
  clearInterval(mmInterval);
  showScreen('memory');
  const tiles=[];
  mmPairs.forEach((p,i)=>{tiles.push({id:i,side:'a',text:p.a});tiles.push({id:i,side:'b',text:p.b})});
  const grid=document.getElementById('mm-grid');
  grid.innerHTML='';
  shuffle(tiles).forEach(t=>{
    const div=document.createElement('div');
    div.className='mm-tile';
    div.innerHTML=`<div class="mm-tile-inner">${t.text}</div>`;
    div.onclick=()=>mmClick(div,t);
    grid.appendChild(div);
  });
  mmInterval=setInterval(()=>{mmTimer++;document.getElementById('mm-timer').textContent=`⏱ ${mmTimer}s`},1000);
  mmUpdateStats();
}
function mmClick(div,t){
  if(mmLocked||div.classList.contains('matched')||div.classList.contains('revealed'))return;
  div.classList.add('revealed');
  mmFlipped.push({div,t});
  if(mmFlipped.length===2){
    mmMoves++;mmLocked=true;
    const [a,b]=mmFlipped;
    if(a.t.id===b.t.id&&a.t.side!==b.t.side){
      a.div.classList.add('matched');b.div.classList.add('matched');
      mmMatched++;mmFlipped=[];mmLocked=false;
      mmUpdateStats();
      if(mmMatched===mmPairs.length){clearInterval(mmInterval);setTimeout(()=>showResult('memory',mmPairs.length,mmPairs.length,`用了 ${mmMoves} 步，${mmTimer} 秒完成！`),400)}
    } else {
      a.div.classList.add('wrong');b.div.classList.add('wrong');
      setTimeout(()=>{a.div.classList.remove('revealed','wrong');b.div.classList.remove('revealed','wrong');mmFlipped=[];mmLocked=false},800);
    }
    mmUpdateStats();
  }
}
function mmUpdateStats(){
  document.getElementById('mm-pairs').textContent=`配對：${mmMatched} / ${mmPairs.length}`;
  document.getElementById('mm-moves').textContent=`步數：${mmMoves}`;
  document.getElementById('mm-score-badge').textContent=`${mmMatched} 配對`;
}

// TONE QUIZ
let tqIdx=0,tqScore=0,tqSelected=null,tqList=[];
function startToneQuiz(){tqIdx=0;tqScore=0;tqSelected=null;tqList=shuffle(toneData);showScreen('tonequiz');renderTQ()}
function renderTQ(){
  if(tqIdx>=tqList.length){showResult('tonequiz',tqScore,tqList.length,'聲調練習完成！');return}
  tqSelected=null;
  const q=tqList[tqIdx];
  document.getElementById('tq-q-num').textContent=`第 ${tqIdx+1} 題 / 共 ${tqList.length} 題`;
  document.getElementById('tq-char').textContent=q.char;
  document.getElementById('tq-meaning').textContent=q.meaning;
  document.getElementById('tq-progress').style.width=`${tqIdx/tqList.length*100}%`;
  document.getElementById('tq-score-badge').textContent=`${tqScore}分`;
  const submit=document.getElementById('tq-submit');
  submit.disabled=true;submit.textContent='確認 ✓';submit.onclick=tqSubmit;
  const grid=document.getElementById('tq-grid');
  grid.innerHTML='';
  shuffle(q.opts).forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='tq-btn';btn.textContent=opt;
    btn.onclick=()=>{document.querySelectorAll('.tq-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');tqSelected=opt;submit.disabled=false};
    grid.appendChild(btn);
  });
}
function tqSubmit(){
  const q=tqList[tqIdx];
  document.querySelectorAll('.tq-btn').forEach(b=>{
    b.disabled=true;b.classList.remove('selected');
    if(b.textContent===q.correct)b.classList.add('correct');
    else if(b.textContent===tqSelected&&tqSelected!==q.correct)b.classList.add('wrong');
  });
  if(tqSelected===q.correct)tqScore++;
  const submit=document.getElementById('tq-submit');
  submit.textContent='下一題 →';submit.disabled=false;
  submit.onclick=()=>{tqIdx++;submit.onclick=tqSubmit;renderTQ()};
}

// SENTENCE2
let s2Idx=0,s2Score=0,s2Answered=false,s2Selected=[],s2Current=null;
function startSentence2(){s2Idx=0;s2Score=0;showScreen('sentence2');renderS2()}
function renderS2(){
  if(s2Idx>=sentences2.length){showResult('sentence2',s2Score,sentences2.length,'拼圖全部完成！');return}
  s2Answered=false;s2Selected=[];
  s2Current=sentences2[s2Idx];
  document.getElementById('s2-q-num').textContent=`第 ${s2Idx+1} 題 / 共 ${sentences2.length} 題`;
  document.getElementById('s2-prompt').textContent=s2Current.prompt;
  document.getElementById('s2-score-badge').textContent=`${s2Score} / ${s2Idx}`;
  const fb=document.getElementById('s2-feedback');fb.style.display='none';fb.className='s2-feedback';
  const shuffled=shuffle(s2Current.tiles.map((t,i)=>({...t,idx:i})));
  const bank=document.getElementById('s2-bank');bank.innerHTML='';
  shuffled.forEach(t=>{
    const div=document.createElement('div');
    div.className='s2-bank-tile';
    div.innerHTML=`<div class="tile-cn">${t.cn}</div>${t.py?`<div class="tile-py">${t.py}</div>`:''}`;
    div.onclick=()=>s2Pick(div,t);
    bank.appendChild(div);
  });
  document.getElementById('s2-answer').innerHTML='';
  document.getElementById('s2-answer').className='s2-answer-area';
}
function s2Pick(div,t){
  if(s2Answered)return;
  div.classList.add('used');s2Selected.push(t);
  const area=document.getElementById('s2-answer');area.classList.add('has-content');
  const tile=document.createElement('div');
  tile.className='s2-tile pop';
  tile.innerHTML=`<div class="tile-cn">${t.cn}</div>${t.py?`<div class="tile-py">${t.py}</div>`:''}`;
  tile.onclick=()=>{s2Selected=s2Selected.filter(s=>s.idx!==t.idx);div.classList.remove('used');tile.remove();if(s2Selected.length===0)area.classList.remove('has-content')};
  area.appendChild(tile);
}
function s2Clear(){s2Selected=[];document.getElementById('s2-answer').innerHTML='';document.getElementById('s2-answer').className='s2-answer-area';document.querySelectorAll('.s2-bank-tile').forEach(b=>b.classList.remove('used'))}
function s2Check(){
  if(s2Answered||s2Selected.length===0)return;
  s2Answered=true;
  const ans=s2Selected.map(s=>s.cn).join('');
  const fb=document.getElementById('s2-feedback');fb.style.display='block';
  if(ans===s2Current.answer){s2Score++;fb.className='s2-feedback correct';fb.innerHTML=`✓ 正確！<br><small>${s2Current.answer}</small>`}
  else{fb.className='s2-feedback wrong';fb.innerHTML=`✗ 再想想！正確答案：<br><strong>${s2Current.answer}</strong>`}
  setTimeout(()=>{s2Idx++;renderS2()},1800);
}
